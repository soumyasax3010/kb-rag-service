name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      # Unit tests only (chunker + API validation). Integration tests that need
      # a live pgvector + OPENAI_API_KEY are excluded via marker skipping.
      - run: uv run pytest -q
